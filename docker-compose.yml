# Self-hosted, fully open-source deploy: Ollama + the app on one machine.
# Run on any VM with Docker (e.g. an Oracle Cloud Always Free ARM instance,
# which has enough RAM to run Ollama on CPU). Then open http://<vm-ip>:8000
#
#   docker compose up -d            # start
#   docker compose exec ollama ollama pull llama3
#   docker compose exec ollama ollama pull nomic-embed-text
#
services:
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      LLM_MODEL: ${LLM_MODEL:-llama3}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text}
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-change-this-secret-key}
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama_models:
